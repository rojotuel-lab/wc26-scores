name: Backup Predictions

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 minutos, todo el día
  workflow_dispatch: {}      # para poder ejecutarlo manualmente y probarlo

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Run backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node backup-predictions.js

      - name: Commit backup if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/predictions-latest.json
          git diff --staged --quiet || (git commit -m "Backup diario de predicciones" && git pull --rebase && git push)
