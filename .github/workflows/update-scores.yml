name: Update World Cup Scores

on:
  schedule:
    # Runs every 15 minutes, 24/7 — free on GitHub's standard runners.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run score updater
        run: node update-scores.js
        env:
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
