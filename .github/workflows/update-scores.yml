name: Update World Cup Scores

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write   # necesario para que la Action pueda hacer commit en el repo

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run score updater
        run: node update-scores.js

      - name: Commit scores.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || git commit -m "Actualizar marcadores [skip ci]"
          git push
