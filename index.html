// CAPA DE ALMACENAMIENTO — sustituye al window.storage de Claude.ai.
// - Datos personales (shared:false) -> localStorage del propio navegador.
// - Datos compartidos (shared:true) -> un bin de JSONBin (predicciones +
//   marcador de versión de la semilla). Los marcadores en vivo se leen
//   directamente del bin público de resultados (ver fetchScores más abajo),
//   y aquí solo se cachean localmente para una carga inicial instantánea.
//
// ⚠️ PASO PENDIENTE (ver SETUP_WEBSITE.md): sustituye estos dos valores
// por el Bin ID y la X-Master-Key de tu segundo bin de JSONBin (el de
// predicciones). Hasta entonces, guardar/cargar pronósticos mostrará un
// aviso claro en pantalla.
const DATA_BIN_ID = "6a33f7b4f5f4af5e2908e777";
const DATA_BIN_KEY = "$2a$10$akz/QRgSqYpcJrT8BC8Yje0kbTXbgHSWm7X.ON6b.jsdCBEDl5D6q";
const DATA_READ_URL = `https://api.jsonbin.io/v3/b/${DATA_BIN_ID}/latest`;
const DATA_WRITE_URL = `https://api.jsonbin.io/v3/b/${DATA_BIN_ID}`;

async function fetchWithTimeout(url, options, timeoutMs){
  const controller=new AbortController();
  const id=setTimeout(()=>controller.abort(), timeoutMs||10000);
  try{
    return await fetch(url, {...(options||{}), signal: controller.signal});
  }finally{
    clearTimeout(id);
  }
}

const Storage = {
  async get(key, shared){
    if(!shared){
      try{
        const v = localStorage.getItem(key);
        return v!=null ? {key, value:v, shared:false} : null;
      }catch(e){ return null; }
    }
    if(DATA_BIN_ID==="YOUR_PREDICTIONS_BIN_ID") throw new Error("Falta configurar el bin de predicciones (ver SETUP_WEBSITE.md)");
    const res = await fetchWithTimeout(DATA_READ_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const record = data.record||{};
    if(!(key in record)) return null;
    return {key, value: JSON.stringify(record[key]), shared:true};
  },
  async set(key, value, shared){
    if(!shared){
      try{ localStorage.setItem(key, value); }catch(e){}
      return {key, value, shared:false};
    }
    if(DATA_BIN_ID==="YOUR_PREDICTIONS_BIN_ID") throw new Error("Falta configurar el bin de predicciones (ver SETUP_WEBSITE.md)");
    const res = await fetchWithTimeout(DATA_READ_URL);
    if(!res.ok) throw new Error("No se pudo leer el estado actual antes de guardar (HTTP "+res.status+")");
    const data = await res.json();
    const record = data.record||{};
    record[key] = JSON.parse(value);
    const putRes = await fetchWithTimeout(DATA_WRITE_URL, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":DATA_BIN_KEY,"X-Bin-Versioning":"true"},
      body: JSON.stringify(record)
    });
    if(!putRes.ok) throw new Error("HTTP "+putRes.status);
    return {key, value, shared:true};
  },
  async delete(key, shared){
    if(!shared){
      try{ localStorage.removeItem(key); }catch(e){}
      return {key, deleted:true, shared:false};
    }
    return null;
  }
};

const fmtDate = s => excelToDate(s).toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short"});

// Convierte fecha+hora de España (CEST, UTC+2) a un instante real (timestamp UTC),
// para poder comparar con la hora real del dispositivo sin importar su zona horaria.
function kickoffFromExcel(ds,time){
  const d=excelToDate(ds);
  const y=d.getUTCFullYear(), m=String(d.getUTCMonth()+1).padStart(2,"0"), day=String(d.getUTCDate()).padStart(2,"0");
  return new Date(`${y}-${m}-${day}T${time}:00+02:00`).getTime();
}
function kickoffFromISO(iso,time){
  return new Date(`${iso}T${time}:00+02:00`).getTime();
}

function getRound(id){
  if(id<=72) return "Fase de Grupos";
  if(id<=88) return "Ronda de 32";
  if(id<=96) return "Octavos de Final";
  if(id<=100) return "Cuartos de Final";
  if(id<=102) return "Semifinales";
  if(id===103) return "3er Puesto";
  if(id===104) return "Final";
  return "Eliminatoria";
}

async function sha256Hex(str){
  const enc=new TextEncoder().encode(str);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function verifyPin(name,pin){
  if(!PIN_HASHES[name]) return false;
  const hash=await sha256Hex(`${name}:${pin}`);
  return hash===PIN_HASHES[name];
}

function calcPts(pred, s1, s2){
  if(s1===null||s2===null) return null;
  if(!pred||pred.a==null||pred.b==null) return null;
  if(pred.a===s1&&pred.b===s2) return 3;
  if(Math.sign(pred.a-pred.b)===Math.sign(s1-s2)) return 1;
  return 0;
}

function calcStats(name, allPreds, matches){
  const myPreds = allPreds[name]||{};
  let pts=0,exact=0,correct=0,predicted=0;
  for(const m of matches){
    if(m.st!=="Finalizado") continue;
    const pred=myPreds[m.id];
    if(!pred) continue;
    predicted++;
    const p=calcPts(pred,m.s1,m.s2);
    if(p===3){pts+=3;exact++;correct++;}
    else if(p===1){pts+=1;correct++;}
  }
  return {pts,exact,correct,predicted};
}

function StatusBadge({status}){
  if(status==="Finalizado") return <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">FIN</span>;
  if(status==="En vivo") return(
    <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold flex items-center gap-1">
      <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse inline-block"></span>
      EN VIVO
    </span>
  );
  if(status==="Cerrado") return(
    <span className="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-bold flex items-center gap-1">
      🔒 Cerrado
    </span>
  );
  return <span className="text-xs bg-blue-50 text-blue-500 px-2 py-0.5 rounded-full font-medium">Próximo</span>;
}

function PtsBadge({pts}){
  if(pts===null||pts===undefined) return null;
  if(pts===3) return <span className="text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">+3 ★</span>;
  if(pts===1) return <span className="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-200 px-2 py-0.5 rounded-full">+1 ✓</span>;
  return <span className="text-xs font-bold text-gray-400 bg-gray-50 border border-gray-200 px-2 py-0.5 rounded-full">✗</span>;
}

function PredInput({matchId,userName,pred,onSave,locked}){
  const [a,setA]=useState(pred?.a!=null?String(pred.a):"");
  const [b,setB]=useState(pred?.b!=null?String(pred.b):"");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    setA(pred?.a!=null?String(pred.a):"");
    setB(pred?.b!=null?String(pred.b):"");
    setErr("");
  },[userName,matchId,pred?.a,pred?.b]);

  if(locked){
    if(pred?.a==null) return <span className="text-sm text-gray-300 italic">sin pronóstico</span>;
    return <span className="text-sm font-bold text-gray-600">{pred.a} — {pred.b}</span>;
  }

  const na=parseInt(a,10),nb=parseInt(b,10);
  const validInput=a!==""&&b!==""&&!isNaN(na)&&!isNaN(nb)&&na>=0&&nb>=0;
  const matchesSaved=validInput&&pred?.a===na&&pred?.b===nb;
  const isDirty=validInput&&!matchesSaved;

  const handleClick=async()=>{
    setSaving(true);setErr("");
    try{
      await onSave({a:na,b:nb});
    }catch(e){
      setErr("Error, reintenta");
    }
    setSaving(false);
  };

  return(
    <div className="flex items-center gap-1.5 flex-wrap">
      <input type="number" min="0" max="25" value={a}
        onChange={e=>setA(e.target.value)}
        className="w-11 h-9 text-center border-2 border-gray-200 rounded-lg text-sm font-bold focus:border-blue-400 focus:outline-none bg-white"
        placeholder="?"/>
      <span className="text-gray-400 font-bold text-sm">-</span>
      <input type="number" min="0" max="25" value={b}
        onChange={e=>setB(e.target.value)}
        className="w-11 h-9 text-center border-2 border-gray-200 rounded-lg text-sm font-bold focus:border-blue-400 focus:outline-none bg-white"
        placeholder="?"/>
      {saving&&<span className="text-xs text-gray-400 font-semibold">Guardando...</span>}
      {!saving&&isDirty&&(
        <button onClick={handleClick}
          className="text-xs font-bold bg-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 active:bg-blue-800">
          Guardar
        </button>
      )}
      {!saving&&matchesSaved&&(
        <span className="text-xs text-emerald-600 font-bold flex items-center gap-0.5">✓ Guardado</span>
      )}
      {!saving&&err&&(
        <button onClick={handleClick} className="text-xs font-bold text-red-600 underline">{err} — Guardar</button>
      )}
    </div>
  );
}

function GridPronosticos({preds,matches}){
  const [search,setSearch]=useState("");

  const visibleMatches=matches;

  const NAMES=Object.keys(preds).sort();
  const filteredNames=search.trim()===""?NAMES:NAMES.filter(n=>n.toLowerCase().includes(search.toLowerCase()));

  function calcPts(pred,m){
    const s1=m.effS1??m.s1; const s2=m.effS2??m.s2;
    if(s1===null||s2===null) return null;
    if(!pred||pred.a==null||pred.b==null) return null;
    if(pred.a===s1&&pred.b===s2) return 3;
    const sign=x=>x>0?1:x<0?-1:0;
    if(sign(pred.a-pred.b)===sign(s1-s2)) return 1;
    return 0;
  }

  function cellColor(pts,finished){
    if(!finished||pts===null) return "bg-gray-50 text-gray-500";
    if(pts===3) return "bg-emerald-100 text-emerald-800 font-bold";
    if(pts===1) return "bg-yellow-100 text-yellow-800";
    return "bg-red-100 text-red-700";
  }

  const colW=52;

  return(
    <div className="pb-8">
      {/* Search */}
      <div className="px-3 pt-3 pb-2">
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Buscar participante..."
          className="w-full text-xs border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"/>
      </div>

      {/* Legend */}
      <div className="px-3 pb-2 flex gap-3">
        <span className="text-xs flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-200 inline-block"></span>3 pts</span>
        <span className="text-xs flex items-center gap-1"><span className="w-3 h-3 rounded bg-yellow-200 inline-block"></span>1 pt</span>
        <span className="text-xs flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-200 inline-block"></span>0 pts</span>
        <span className="text-xs flex items-center gap-1"><span className="w-3 h-3 rounded bg-gray-100 inline-block"></span>Sin resultado</span>
      </div>

      {/* Grid */}
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"70vh"}}>
        <table style={{borderCollapse:"collapse",minWidth:`${180+visibleMatches.length*colW}px`}}>
          <thead>
            <tr>
              {/* Sticky name column header */}
              <th style={{position:"sticky",left:0,zIndex:10,background:"#1f2937",color:"white",
                fontSize:"10px",fontWeight:700,padding:"6px 8px",textAlign:"left",
                minWidth:"180px",borderRight:"1px solid #374151",whiteSpace:"nowrap"}}>
                Participante
              </th>
              {visibleMatches.map(m=>{
                const finished=m.effSt==="Finalizado"||(m.effS1!==null&&m.effS2!==null&&m.effSt!=="Programado"&&m.effSt!=="En vivo"&&m.effSt!=="Cerrado");
                const live=m.effSt==="En vivo";
                return(
                  <th key={m.id} style={{background:live?"#7f1d1d":finished?"#374151":"#1f2937",
                    color:"white",fontSize:"9px",fontWeight:600,
                    padding:"4px 2px",textAlign:"center",minWidth:`${colW}px`,
                    maxWidth:`${colW}px`,borderRight:"1px solid #374151",verticalAlign:"bottom"}}>
                    <div style={{writingMode:"vertical-rl",transform:"rotate(180deg)",
                      lineHeight:1.1,maxHeight:"80px",overflow:"hidden",
                      textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {m.t1} - {m.t2}
                    </div>
                    <div style={{marginTop:"3px",fontSize:"8px",opacity:0.7}}>
                      {live?"🔴":finished?"✅":"🕐"}
                    </div>
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {filteredNames.map((name,ri)=>(
              <tr key={name} style={{background:ri%2===0?"#f9fafb":"white"}}>
                {/* Sticky name cell */}
                <td style={{position:"sticky",left:0,zIndex:5,
                  background:ri%2===0?"#f9fafb":"white",
                  fontSize:"11px",fontWeight:600,color:"#1f2937",
                  padding:"4px 8px",borderRight:"2px solid #e5e7eb",
                  whiteSpace:"nowrap",maxWidth:"180px",overflow:"hidden",
                  textOverflow:"ellipsis"}}>
                  {name}
                </td>
                {visibleMatches.map(m=>{
                  const pred=preds[name]&&preds[name][m.id];
                  const finished=(m.effS1!==null&&m.effS2!==null&&m.effSt!=="Programado"&&m.effSt!=="En vivo"&&m.effSt!=="Cerrado")||m.effSt==="Finalizado";
                  const pts=calcPts(pred,m);
                  const cls=cellColor(pts,finished);
                  return(
                    <td key={m.id}
                      className={cls}
                      style={{fontSize:"10px",textAlign:"center",
                        padding:"3px 1px",borderRight:"1px solid #e5e7eb",
                        minWidth:`${colW}px`,maxWidth:`${colW}px`}}>
                      {pred&&pred.a!=null&&pred.b!=null
                        ?`${pred.a}-${pred.b}`
                        :<span style={{opacity:0.3}}>—</span>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Clasificacion({preds,matches}){
  const rows=PARTICIPANTS
    .map(name=>({name,...calcStats(name,preds,matches)}))
    .sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.exact-a.exact);
  const medals=["🥇","🥈","🥉"];
  return(
    <div className="p-4">
      <p className="text-xs text-gray-400 mb-3">Desempate: marcadores exactos · Se actualiza en tiempo real</p>
      <div className="rounded-2xl overflow-hidden border border-gray-200 shadow-sm">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-gray-800 text-gray-100 text-xs">
              <th className="py-2.5 pl-3 pr-1 text-left w-8">#</th>
              <th className="py-2.5 px-2 text-left">Participante</th>
              <th className="py-2.5 px-2 text-center w-12">Pts</th>
              <th className="py-2.5 px-2 text-center w-10 text-yellow-300">★</th>
              <th className="py-2.5 pr-3 text-center w-10 text-green-300">✓</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={r.name} className={`border-t border-gray-100 ${i===0?"bg-yellow-50":i===1?"bg-gray-50":i===2?"bg-orange-50/70":""}`}>
                <td className="py-2.5 pl-3 pr-1 text-base">{medals[i]||<span className="text-xs text-gray-400 font-bold">{i+1}</span>}</td>
                <td className="py-2.5 px-2 font-semibold text-gray-800 text-sm" style={{maxWidth:"140px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</td>
                <td className="py-2.5 px-2 text-center font-black text-blue-700 text-lg">{r.pts}</td>
                <td className="py-2.5 px-2 text-center font-semibold text-emerald-600">{r.exact}</td>
                <td className="py-2.5 pr-3 text-center text-gray-500">{r.correct}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Partidos({matches}){
  const [filter,setFilter]=useState("all");
  const filtered=matches.filter(m=>
    filter==="all"||(filter==="done"&&m.effSt==="Finalizado")||
    (filter==="live"&&(m.effSt==="En vivo"||m.effSt==="Cerrado"))||(filter==="next"&&m.effSt==="Programado")
  );
  const groups={};
  filtered.forEach(m=>{if(!groups[m.dateStr])groups[m.dateStr]=[];groups[m.dateStr].push(m);});
  return(
    <div className="p-4">
      <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
        {[["all","Todos"],["done","Finalizados"],["live","En vivo"],["next","Próximos"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)}
            className={`text-xs px-3 py-1.5 rounded-full font-medium whitespace-nowrap transition-colors
              ${filter===v?"bg-gray-800 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
            {l}
          </button>
        ))}
      </div>
      {Object.entries(groups).map(([date,ms])=>(
        <div key={date} className="mb-5">
          <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">{date}</p>
          <div className="space-y-2">
            {ms.map(m=>(
              <div key={m.id} className={`rounded-xl border p-3 bg-white ${m.effSt==="En vivo"?"border-red-200":m.effSt==="Cerrado"?"border-orange-200":"border-gray-100"}`}>
                <div className="flex justify-between items-center mb-2">
                  <span className="text-xs text-gray-400">#{m.id} · {m.time}h · {m.round}{m.venue?` · ${m.venue}`:""}</span>
                  <StatusBadge status={m.effSt}/>
                </div>
                <div className="flex items-center gap-1">
                  <span className="flex-1 text-right font-semibold text-gray-800 text-sm truncate">{m.t1}</span>
                  <span className={`font-black text-base px-2 min-w-[72px] text-center
                    ${m.effSt==="Programado"?"text-gray-300":m.effSt==="En vivo"?"text-red-600":m.effSt==="Cerrado"?"text-orange-500":"text-gray-900"}`}>
                    {m.st==="Programado"?"vs":`${m.s1??"?"} — ${m.s2??"?"}`}
                  </span>
                  <span className="flex-1 font-semibold text-gray-800 text-sm truncate">{m.t2}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
      {filtered.length===0&&<div className="text-center py-12 text-gray-400">No hay partidos en esta categoría</div>}
    </div>
  );
}

function EnVivo({matches}){
  const live=matches.filter(m=>m.effSt==="En vivo"||m.effSt==="Cerrado");
  const next=matches.filter(m=>m.effSt==="Programado"&&m.known).slice(0,10);
  return(
    <div className="p-4">
      {live.length>0&&(
        <div className="mb-6">
          <p className="text-xs font-bold text-red-500 uppercase tracking-wide mb-3">En vivo / en curso ahora</p>
          <div className="space-y-3">
            {live.map(m=>(
              <div key={m.id} className={`rounded-2xl border p-4 ${m.effSt==="Cerrado"?"bg-orange-50 border-orange-200":"bg-red-50 border-red-200"}`}>
                <div className="flex justify-between items-center mb-3">
                  <p className="text-xs text-gray-500 font-medium">{m.dateStr} · {m.time}h España · {m.round}</p>
                  <StatusBadge status={m.effSt}/>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex-1 text-right"><p className="font-black text-gray-900 text-base">{m.t1}</p><p className="text-xs text-gray-400">{m.c1}</p></div>
                  <p className={`text-3xl font-black px-4 min-w-[80px] text-center ${m.effSt==="Cerrado"?"text-orange-500":"text-red-600"}`}>{m.s1??"?"} — {m.s2??"?"}</p>
                  <div className="flex-1"><p className="font-black text-gray-900 text-base">{m.t2}</p><p className="text-xs text-gray-400">{m.c2}</p></div>
                </div>
                {m.effSt==="Cerrado"&&<p className="text-xs text-orange-600 mt-2 text-center">Ya empezó — pronósticos cerrados. Resultado pendiente de confirmar (pulsa Actualizar).</p>}
              </div>
            ))}
          </div>
        </div>
      )}
      {live.length===0&&(
        <div className="bg-gray-50 rounded-2xl p-6 text-center text-gray-400 mb-6">
          <p className="text-2xl mb-1">⏸</p>
          <p className="text-sm font-medium">No hay partidos en vivo</p>
          <p className="text-xs mt-1">Pulsa Actualizar para comprobar</p>
        </div>
      )}
      <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Próximos {next.length} partidos</p>
      <div className="space-y-2">
        {next.map(m=>(
          <div key={m.id} className="bg-white rounded-xl border border-gray-100 p-3 shadow-sm">
            <p className="text-xs text-gray-400 mb-1.5">{m.dateStr} · {m.time}h España · {m.round}</p>
            <div className="flex items-center gap-2">
              <span className="flex-1 text-right font-semibold text-gray-800 text-sm truncate">{m.t1}</span>
              <span className="text-gray-300 font-bold px-2">vs</span>
              <span className="flex-1 font-semibold text-gray-800 text-sm truncate">{m.t2}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Pronosticos({preds,matches,onSave}){
  const [name,setName]=useState("");
  const [unlockedName,setUnlockedName]=useState("");
  const [authLoading,setAuthLoading]=useState(true);
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState("");
  const [checking,setChecking]=useState(false);
  const [saveError,setSaveError]=useState("");

  const myPreds=preds[name]||{};
  const stats=name?calcStats(name,preds,matches):null;
  const knownMatches=matches.filter(m=>m.known);
  const upcoming=knownMatches.filter(m=>m.st!=="Finalizado");
  const done=knownMatches.filter(m=>m.st==="Finalizado");
  const canEdit=name&&name===unlockedName;

  useEffect(()=>{
    (async()=>{
      try{
        const r=await Storage.get("wc26_unlocked",false);
        if(r){
          const data=JSON.parse(r.value);
          if(data?.name&&PARTICIPANTS.includes(data.name)){
            setUnlockedName(data.name);
            setName(data.name);
          }
        }
      }catch(e){}
      setAuthLoading(false);
    })();
  },[]);

  const handleSave=useCallback(async(matchId,pred)=>{
    setSaveError("");
    try{
      await onSave(name,matchId,pred);
    }catch(e){
      setSaveError(`❌ No se pudo guardar: ${e.message}`);
      setTimeout(()=>setSaveError(""),8000);
      throw e;
    }
  },[name,onSave]);

  const handleUnlock=async()=>{
    if(pinInput.length<4){setPinError("Introduce tu PIN de 4 dígitos");return;}
    setChecking(true);setPinError("");
    const ok=await verifyPin(name,pinInput);
    setChecking(false);
    if(ok){
      setUnlockedName(name);
      setPinInput("");
      try{await Storage.set("wc26_unlocked",JSON.stringify({name}),false);}catch(e){}
    } else {
      setPinError("PIN incorrecto");
    }
  };

  const handleLogout=async()=>{
    setUnlockedName("");
    setName("");
    setPinInput("");
    try{await Storage.delete("wc26_unlocked",false);}catch(e){}
  };

  return(
    <div className="p-4">
      <div className="mb-4">
        <label className="block text-sm font-semibold text-gray-700 mb-1.5">¿Quién eres?</label>
        <select value={name} onChange={e=>{setName(e.target.value);setPinInput("");setPinError("");}}
          className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm font-medium focus:outline-none focus:border-blue-400 bg-white">
          <option value="">— Selecciona tu nombre (orden alfabético) —</option>
          {PARTICIPANTS.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>

      {!name&&!authLoading&&(
        <div className="text-center py-16 text-gray-400">
          <p className="text-4xl mb-3">👤</p>
          <p className="font-medium text-gray-500">Selecciona tu nombre</p>
          <p className="text-sm mt-1">para ver pronósticos, o introduce tu PIN para editar los tuyos</p>
        </div>
      )}

      {name&&!canEdit&&(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 mb-5">
          <p className="text-sm font-bold text-amber-800 mb-1">🔒 Pronósticos de {name} bloqueados</p>
          <p className="text-xs text-amber-700 mb-3">Solo {name} puede editar sus propios pronósticos. Introduce el PIN para desbloquear (puedes seguir viendo sus pronósticos sin él).</p>
          <div className="flex gap-2">
            <input type="password" inputMode="numeric" maxLength={4} value={pinInput}
              onChange={e=>{setPinInput(e.target.value.replace(/\D/g,""));setPinError("");}}
              onKeyDown={e=>{if(e.key==="Enter")handleUnlock();}}
              placeholder="PIN (4 dígitos)"
              className="flex-1 border-2 border-amber-300 rounded-xl p-2.5 text-sm font-semibold text-center tracking-widest focus:outline-none focus:border-amber-500 bg-white"/>
            <button onClick={handleUnlock} disabled={checking}
              className="bg-amber-600 hover:bg-amber-700 text-white text-sm font-bold px-4 rounded-xl disabled:opacity-50">
              {checking?"...":"Desbloquear"}
            </button>
          </div>
          {pinError&&<p className="text-xs text-red-600 font-semibold mt-2">{pinError}</p>}
        </div>
      )}

      {name&&canEdit&&(
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-2.5 mb-4 flex justify-between items-center">
          <span className="text-xs font-semibold text-emerald-700">🔓 Sesión iniciada como {name}</span>
          <button onClick={handleLogout} className="text-xs font-semibold text-emerald-700 underline hover:text-emerald-900">Cerrar sesión</button>
        </div>
      )}

      {saveError&&(
        <div className="bg-red-50 border border-red-200 rounded-xl p-2.5 mb-4 text-xs font-semibold text-red-700">
          {saveError}
        </div>
      )}

      {name&&stats&&(
        <div className="bg-gray-800 rounded-2xl p-4 mb-5 text-white">
          <p className="text-xs font-semibold text-gray-400 mb-3 truncate">{name}</p>
          <div className="grid grid-cols-4 gap-2 text-center">
            {[["Puntos",stats.pts,"text-white"],["Exactos",stats.exact,"text-yellow-300"],["Correct.",stats.correct,"text-green-300"],["Predichos",stats.predicted,"text-gray-400"]].map(([label,val,color])=>(
              <div key={label}><p className={`text-2xl font-black ${color}`}>{val}</p><p className="text-xs text-gray-500 mt-0.5">{label}</p></div>
            ))}
          </div>
        </div>
      )}

      {name&&upcoming.length>0&&(
        <div className="mb-5">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex-1 h-px bg-gray-200"></div>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide whitespace-nowrap">Por pronosticar ({upcoming.length})</p>
            <div className="flex-1 h-px bg-gray-200"></div>
          </div>
          <div className="space-y-2">
            {upcoming.map(m=>{
              const pred=myPreds[m.id];
              const inputLocked=!canEdit||!m.editable;
              return(
                <div key={m.id} className={`bg-white rounded-xl border-2 p-3 ${m.effSt==="En vivo"?"border-red-200":m.effSt==="Cerrado"?"border-orange-200":pred?"border-blue-100":"border-gray-100"}`}>
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-xs text-gray-400">#{m.id} · {m.dateStr} {m.time}h</span>
                    <div className="flex items-center gap-2">
                      <StatusBadge status={m.effSt}/>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="flex-1 text-right text-sm font-semibold text-gray-800 truncate">{m.t1}</span>
                    <PredInput key={`${name}-${m.id}`} matchId={m.id} userName={name} pred={pred}
                      onSave={pr=>handleSave(m.id,pr)} locked={inputLocked}/>
                    <span className="flex-1 text-sm font-semibold text-gray-800 truncate">{m.t2}</span>
                  </div>
                  {canEdit&&!m.editable&&(
                    <p className="text-xs text-orange-600 mt-2">🔒 El partido ya empezó — ya no se puede modificar el pronóstico.</p>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {name&&done.length>0&&(
        <div>
          <div className="flex items-center gap-2 mb-3">
            <div className="flex-1 h-px bg-gray-200"></div>
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Historial</p>
            <div className="flex-1 h-px bg-gray-200"></div>
          </div>
          <div className="space-y-2">
            {[...done].reverse().map(m=>{
              const pred=myPreds[m.id];
              const p=calcPts(pred,m.s1,m.s2);
              return(
                <div key={m.id} className={`rounded-xl border p-3 ${p===3?"bg-emerald-50 border-emerald-100":p===1?"bg-blue-50 border-blue-100":"bg-white border-gray-100"}`}>
                  <div className="flex justify-between items-center mb-1.5">
                    <span className="text-xs text-gray-400">#{m.id} · {m.dateStr}</span>
                    <PtsBadge pts={p}/>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="flex-1 text-right text-sm font-semibold text-gray-800 truncate">{m.t1}</span>
                    <div className="flex flex-col items-center gap-0.5 px-1">
                      <span className="text-sm font-black text-gray-900">{m.s1} — {m.s2}</span>
                      <PredInput matchId={m.id} userName={name} pred={pred} locked={true}/>
                    </div>
                    <span className="flex-1 text-sm font-semibold text-gray-800 truncate">{m.t2}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function Reglas(){
  return(
    <div className="p-4">
      <div className="bg-white rounded-2xl border border-gray-100 p-4 space-y-4">
        <div>
          <p className="font-bold text-gray-800 mb-2">⚽ Sistema de puntuación</p>
          <div className="space-y-2 text-sm text-gray-700">
            <div className="flex gap-3 items-start"><span className="bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded text-xs shrink-0">1 pt</span><span>Acertar el resultado (victoria local, empate o visitante)</span></div>
            <div className="flex gap-3 items-start"><span className="bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded text-xs shrink-0">3 pts</span><span>Acertar el marcador exacto (incluye el punto de resultado)</span></div>
          </div>
        </div>
        <div className="border-t border-gray-100 pt-3">
          <p className="font-bold text-gray-800 mb-2">🏆 Fase eliminatoria</p>
          <p className="text-sm text-gray-600">Los pronósticos son sobre los 90 minutos reglamentarios, sin contar prórrogas ni penaltis.</p>
        </div>
        <div className="border-t border-gray-100 pt-3">
          <p className="font-bold text-gray-800 mb-2">⏰ Plazo</p>
          <p className="text-sm text-gray-600">Los pronósticos deben enviarse antes del inicio del partido. Sin pronóstico = 0 puntos.</p>
        </div>
        <div className="border-t border-gray-100 pt-3">
          <p className="font-bold text-gray-800 mb-2">🤝 Desempate</p>
          <p className="text-sm text-gray-600">En caso de empate a puntos, gana quien tenga más marcadores exactos. Si sigue el empate, se reparte el premio.</p>
        </div>
        <div className="border-t border-gray-100 pt-3 bg-amber-50 rounded-xl p-3">
          <p className="text-xs font-bold text-amber-700 mb-1">Ejemplo</p>
          <p className="text-xs text-amber-700">Pronóstico: España 2-1 Japón<br/>• Resultado final 1-0 → 1 pt (acierta ganador)<br/>• Resultado final 2-1 → 3 pts (marcador exacto)</p>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("ranking");
  const [preds,setPreds]=useState({});
  const [fetchedScores,setFetchedScores]=useState({});
  const [loading,setLoading]=useState(true);
  const [fetching,setFetching]=useState(false);
  const [msg,setMsg]=useState("");
  const [showRules,setShowRules]=useState(false);
  const [now,setNow]=useState(()=>Date.now());

  useEffect(()=>{
    const t=setInterval(()=>setNow(Date.now()),30000);
    return ()=>clearInterval(t);
  },[]);

  // Refs "siempre actualizadas" para que el temporizador de auto-actualización
  // pueda leer el estado más reciente sin tener que reiniciarse cada vez que cambia `now`.
  const fetchedScoresRef=useRef({});
  fetchedScoresRef.current=fetchedScores;
  const fetchingRef=useRef(false);

  useEffect(()=>{
    (async()=>{
      // La importación inicial desde Excel ya se hizo una vez (manualmente,
      // directamente en JSONBin). A partir de ahora la app SOLO lee lo que
      // haya en JSONBin — nunca vuelve a sobrescribirlo on load, así que
      // ninguna futura actualización del código puede tocar los pronósticos
      // ya guardados, pase lo que pase.
      let current={};
      try{const r=await Storage.get("wc26_preds",true);if(r)current=JSON.parse(r.value);}catch(e){}
      setPreds(current);

      try{const r=await Storage.get("wc26_scores",false);if(r)setFetchedScores(JSON.parse(r.value));}catch(e){}
      setLoading(false);
    })();
  },[]);

  // Cola de guardado: aunque alguien guarde varios pronósticos muy rápido
  // (por ejemplo, el organizador introduciendo predicciones de varios
  // participantes uno tras otro), cada guardado espera a que el anterior
  // termine por completo antes de empezar el suyo. Así dos guardados nunca
  // se solapan y nunca pueden borrarse el uno al otro, sin importar la
  // velocidad a la que se pulse "Guardar".
  const saveQueueRef=useRef(Promise.resolve());

  const savePred=useCallback((name,matchId,pred)=>{
    const run=async()=>{
      // CRÍTICO: si no podemos confirmar los datos más recientes del
      // servidor, NUNCA debemos guardar de todos modos — eso es lo que
      // causó la pérdida de datos anterior (se guardó una copia local
      // incompleta, borrando a todos los demás participantes). Mejor
      // fallar visiblemente que borrar silenciosamente el trabajo de todos.
      const r=await Storage.get("wc26_preds",true); // si falla, lanza error y abortamos aquí
      const fresh=r?JSON.parse(r.value):{};
      const updated={...fresh,[name]:{...(fresh[name]||{}),[matchId]:pred}};
      await Storage.set("wc26_preds",JSON.stringify(updated),true);
      setPreds(updated);

      const m=ALL_MATCHES.find(mm=>mm.id===matchId);
      if(m) notifyPredictionSaved(name, `${m.t1} vs ${m.t2}`, `${pred.a} - ${pred.b}`);
    };
    const next=saveQueueRef.current.then(run,run);
    saveQueueRef.current=next.catch(()=>{}); // un fallo no debe bloquear los siguientes guardados
    return next; // para que quien llamó a savePred siga viendo si ESTE guardado en concreto falló
  },[]);

  // Bin ID de JSONBin (lectura pública, sin necesidad de clave).
  const JSONBIN_BIN_ID="6a33aff5da38895dfed5df51";
  const JSONBIN_READ_URL=`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;

  const fetchScores=async(silent)=>{
    if(fetchingRef.current) return;
    fetchingRef.current=true;
    setFetching(true);
    if(!silent) setMsg("Buscando marcadores...");
    try{
      const controller=new AbortController();
      const timeoutId=setTimeout(()=>controller.abort(),10000); // nunca esperamos más de 10s
      let res;
      try{
        res=await fetch(JSONBIN_READ_URL,{signal:controller.signal});
      }finally{
        clearTimeout(timeoutId);
      }
      if(!res.ok){
        if(!silent) setMsg(`❌ Error JSONBin: HTTP ${res.status}`);
      } else {
        const data=await res.json();
        const ns=data.record||data||{};
        const merged={...fetchedScoresRef.current,...ns};
        fetchedScoresRef.current=merged;
        setFetchedScores(merged);
        await Storage.set("wc26_scores",JSON.stringify(merged),false);
        if(!silent) setMsg(`✅ Marcadores actualizados`);
      }
    }catch(e){
      const msg=e.name==="AbortError" ? "Tiempo de espera agotado" : e.message;
      if(!silent)setMsg(`❌ Error de conexión: ${msg}`);
    }
    fetchingRef.current=false;
    setFetching(false);
    setTimeout(()=>setMsg(""),8000);
  };

  // Auto-actualización mientras la app esté abierta: como ahora la fuente es
  // gratuita (JSONBin, sin coste por consulta), revisamos cada 90 segundos
  // sin restricciones de horario de partidos.
  const fetchScoresRef=useRef(fetchScores);
  fetchScoresRef.current=fetchScores;

  useEffect(()=>{
    const checkAndFetch=()=>fetchScoresRef.current(true);
    const initial=setTimeout(checkAndFetch,5000);
    const interval=setInterval(checkAndFetch,90*1000);
    return ()=>{clearTimeout(initial);clearInterval(interval);};
  },[]);

  const eff=ALL_MATCHES.map(m=>{
    const s=fetchedScores[m.id];
    const st=s?.st??m.st;
    const kickoffPassed=m.known&&now>=m.kickoffMs;
    const editable=st==="Programado"&&!kickoffPassed;
    const effSt=st==="Finalizado"?"Finalizado":st==="En vivo"?"En vivo":(kickoffPassed?"Cerrado":st);
    return{...m,s1:s?.s1??m.s1,s2:s?.s2??m.s2,st,effSt,editable};
  });

  const liveCount=eff.filter(m=>m.effSt==="En vivo"||m.effSt==="Cerrado").length;

  if(loading) return(
    <div className="flex h-screen items-center justify-center bg-gray-50">
      <div className="text-center text-gray-400">
        <p className="text-5xl mb-3 animate-bounce">⚽</p>
        <p className="font-medium">Cargando porra...</p>
      </div>
    </div>
  );

  const TABS=[
    {id:"ranking",icon:"🏆",label:"Ranking"},
    {id:"partidos",icon:"📅",label:"Partidos"},
    {id:"envivo",icon:"⚡",label:"En Vivo"},
    {id:"grid",icon:"📊",label:"Pronósticos"},
    {id:"pronosticos",icon:"🎯",label:"Apostar"},
  ];

  return(
    <div className="min-h-screen bg-gray-50" style={{maxWidth:"520px",margin:"0 auto"}}>
      <div className="bg-gray-900 px-4 py-3 sticky top-0 z-20 shadow-lg">
        <div className="flex justify-between items-center">
          <div>
            <p className="text-white font-black text-lg leading-tight">⚽ Porra Mundial 2026</p>
            <p className="text-gray-400 text-xs">23 participantes · 104 partidos · 🔄 auto-actualización gratuita</p>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setShowRules(!showRules)}
              className="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-2.5 py-1.5 rounded-lg font-medium transition-colors">
              📋 Reglas
            </button>
            <button onClick={()=>fetchScores(false)} disabled={fetching}
              className="text-xs bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-semibold transition-colors disabled:opacity-40 flex items-center gap-1">
              <span className={fetching?"animate-spin inline-block":""}>🔄</span>
              <span>{fetching?"...":"Actualizar"}</span>
            </button>
          </div>
        </div>
        {liveCount>0&&(
          <div className="mt-2 flex items-center gap-1.5 bg-red-900/40 rounded-lg px-2 py-1">
            <span className="w-2 h-2 rounded-full bg-red-400 animate-pulse inline-block"></span>
            <span className="text-xs text-red-300 font-semibold">{liveCount} partido{liveCount>1?"s":""} en vivo ahora</span>
          </div>
        )}
      </div>

      {msg&&(
        <div className={`text-xs px-4 py-2 text-center font-medium border-b ${msg.startsWith("✅")?"bg-emerald-50 text-emerald-700 border-emerald-100":"bg-amber-50 text-amber-700 border-amber-100"}`}>
          {msg}
        </div>
      )}

      <div className="bg-white border-b border-gray-200 sticky top-[58px] z-10">
        <div className="flex">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>{setShowRules(false);setTab(t.id);}}
              className={`flex-1 py-2.5 flex flex-col items-center gap-0.5 transition-colors text-xs font-semibold border-b-2
                ${tab===t.id&&!showRules?"border-blue-600 text-blue-700":"border-transparent text-gray-400 hover:text-gray-600"}`}>
              <span className="text-lg leading-none">{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="pb-8">
        {showRules&&<Reglas/>}
        {!showRules&&tab==="ranking"&&<Clasificacion preds={preds} matches={eff}/>}
        {!showRules&&tab==="partidos"&&<Partidos matches={eff}/>}
        {!showRules&&tab==="envivo"&&<EnVivo matches={eff}/>}
        {!showRules&&tab==="grid"&&<GridPronosticos preds={preds} matches={eff}/>}
        {!showRules&&tab==="pronosticos"&&<Pronosticos preds={preds} matches={eff} onSave={savePred}/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
  // Transformamos manualmente el JSX anterior, forzando el runtime "classic"
  // (usa React.createElement con el React global), ya que React aquí se
  // carga como variable global y no como módulo ES — el runtime "automatic"
  // por defecto de Babel intentaría importar "react/jsx-runtime", que no
  // existe en este contexto sin un bundler.
  const src = document.getElementById('app-source').textContent;
  const { code } = Babel.transform(src, {
    presets: [["react", { runtime: "classic" }]]
  });
  const script = document.createElement('script');
  script.textContent = code;
  document.body.appendChild(script);
</script>
</body>
</html>
